name: graph-rewriting-service

on:
  push:
    branches: ["master"]
    paths:
      - "services/graph-rewriting-service/**"
      - "packages/typescript/**"
  pull_request:
    branches: ["master"]
    paths:
      - "services/graph-rewriting-service/**"
      - "packages/typescript/**"

defaults:
  run:
    working-directory: services/graph-rewriting-service

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"
          cache-dependency-path: services/graph-rewriting-service/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Prettier
        run: npm run prettier
      - name: ESLint
        run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"
          cache-dependency-path: services/graph-rewriting-service/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm run test
      - name: Test summary
        uses: test-summary/action@v2
        with:
          paths: services/graph-rewriting-service/test/results/junit-report.xml
        if: always()
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-graph-rewriting-service
          path: services/graph-rewriting-service/test/coverage/
        if: always()

  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/graph-rewriting-service
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: services/graph-rewriting-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
