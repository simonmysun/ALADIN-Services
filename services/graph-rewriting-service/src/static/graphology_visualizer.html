		let chosenGrammar = 'EPC';

		document
			.querySelector('#grammars')
			.addEventListener('change', async (event) => {
				chosenGrammar = event.target.value;
				handleExecution();
			});

		const dotAttributes = {
			// EPC Styles
			Event: `shape="hexagon", color="indianred1", style="filled"`,
			Function: `shape="rectangle", nodeStyle="rounded", color="green", style="filled"`,
			Gate: `shape="circle", color="grey", style="filled"`,
			pattern: `shape="diamond", color="lightblue", style="filled"`,
			Sequence: `shape="diamond", color="lightblue", style="filled"`,
			// UML-Activity Styles
			Initial: `shape="circle", color="black", style="filled"`,
			Action: `shape="rectangle", nodeStyle="rounded", color="lightblue", style="filled"`,
			Decision: `shape="diamond", color="grey", style="filled"`,
			Fork: `shape="rectangle", color="black", style="filled", fixedsize="true", height="0.08", label=""`,
			Join: `shape="rectangle", color="black", style="filled", fixedsize="true", height="0.08", label=""`,
			Merge: `shape="diamond", color="grey", style="filled"`,
			ActivityFinal: `shape="doublecircle", color="black", style="filled"`,
			// Petrinet Styles

			// Default Node Style (e.g. Sierpinsky)
			default: `shape="circle", color="lightgrey", style="filled"`,
		};

		const graphologyArrayToDotArray = (graphologyArray) => {
			return graphologyArray.map((graph) => {
				const nodeString = transformNodes(graph.nodes);
				const edgeString = transformEdges(graph.edges);
				const dotString = `digraph diagram {\n ${nodeString}\n ${edgeString}\n}`;
				return dotString;
			});
		};

		const transformNodes = (nodes) => {
			return nodes
				.map((node, i) => {
					const { key, attributes } = node;
					const { label, type } = attributes;

					const nodeAttributesString = type
						? `[ label="${label ?? type}", type="${type}" ${dotAttributes[type]}]`
						: `[ label="${i}", ${dotAttributes['default']} ]`;

					return `${key} ${nodeAttributesString}`;
				})
				.join('\n');
		};

		const transformEdges = (edges) => {
			return edges
				.map((edge) => {
					const { source, target } = edge;
					return `${source} -> ${target}`;
				})
				.join('\n');
		};

		let graphs;

		let dotGraphs;

		const handleExecution = async () => {
			const response = await window.fetch('http://127.0.0.1:8080/transform', {
				method: 'POST',
				body: JSON.stringify(grammars[chosenGrammar]),
				headers: {
					'Content-Type': 'application/json',
				},
			});
			graphs = await response.json();
			dotGraphs = graphologyArrayToDotArray(graphs.data);
			i = 0;

			draw();
		};

		document
			.querySelector('#execute')
			.addEventListener('click', handleExecution);

		let i = 0;
		const renderer = window.d3.select('#graph').graphviz();
		const draw = () => {
			const dot = dotGraphs[i];
			console.log(dot);
			if (dot)
				renderer.renderDot(dot).transition(function () {
					return window.d3.transition().duration(150);
				});
		};

		document.querySelector('#forward').addEventListener('click', () => {
			if (i < dotGraphs.length) i++;
			draw();
		});
		document.querySelector('#backward').addEventListener('click', () => {
			if (i > 0) i--;
			draw();
		});

		handleExecution();
	</script>

		}

		.graph {
			display: flex;
			justify-content: center;
			align-items: center;
			width: 100%;
			height: 100%;
		}
	</style>
