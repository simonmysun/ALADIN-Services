name: graph-rewriting-as-a-service-prod

services:
  neo4j:
    image: neo4j:5.25.1
    container_name: graph-rewriting-neo4j
    environment:
      - NEO4J_AUTH=${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set}
      # Optional: to use APOC and Graph Data Science plugins, uncomment:
      # - NEO4J_PLUGINS=["apoc", "graph-data-science"]
    ports:
      - '7474:7474'  # Neo4j Browser
      - '7687:7687'  # Neo4j Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ['CMD', 'cypher-shell', '-u', '${NEO4J_USERNAME:-neo4j}', '-p', '${NEO4J_PASSWORD}', 'RETURN 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  graph-rewriting-service:
    build: .
    image: graph-rewriting-service:latest
    container_name: graph-rewriting-service
    ports:
      - '8080:8080'
    environment:
      - APP_ENV=production
      - DB_BACKEND=neo4j
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set}
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:8080/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
